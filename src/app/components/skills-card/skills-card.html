<div class="card shadow border-0 rounded-4 mb-5">
  <div class="card-body p-5">
    @for (group of groups(); track group.title; let last = $last) {
      <div [class]="last ? 'mb-0' : 'mb-5'">
        <div class="d-flex align-items-center mb-4">
          <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 me-3">
            <i [class]="'bi ' + group.icon"></i>
          </div>
          <h3 class="fw-bolder mb-0"><span class="text-gradient d-inline">{{ group.title }}</span></h3>
        </div>
        <div class="row row-cols-1 row-cols-md-3 g-4">
          @for (skill of group.skills; track skill) {
            <div class="col">
              <div class="d-flex align-items-center bg-light rounded-4 p-3 h-100">{{ skill }}</div>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>

<div class="card shadow border-0 rounded-4 mb-5">
  <div class="card-body p-5">
    <div class="row align-items-center gx-5">
      <div class="col text-center text-lg-start mb-4 mb-lg-0" style="min-width: 0">
        <div class="bg-light p-4 rounded-4">
          <div class="fw-bolder mb-2" [class.text-primary]="accentColor() === 'primary'" [class.text-secondary]="accentColor() === 'secondary'">{{ period() }}</div>
          <div class="mb-2">
            <div class="small fw-bolder">{{ headline() }}</div>
            @if (subline()) {
              <div class="small text-muted">{{ subline() }}</div>
            }
            <div class="small text-muted">{{ location() }}</div>
          </div>
          @if (badge1() || badge2()) {
            <div class="fst-italic">
              @if (badge1()) {
                <div class="small text-muted">{{ badge1() }}</div>
              }
              @if (badge2()) {
                <div class="small text-muted">{{ badge2() }}</div>
              }
            </div>
          }
        </div>
      </div>
      <div class="col-lg-7">
        <div>{{ description() }}</div>
      </div>
    </div>
  </div>
</div>

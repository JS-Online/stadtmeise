<!-- Page Content-->
<div class="container px-5 my-5">
  <div class="text-center mb-5">
    <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">Resume</span></h1>
  </div>
  <!-- Experience & Education side by side on xxl -->
  <div class="row gx-5 justify-content-center">
    <div class="col-xxl-6 col-lg-11 col-xl-9">

      <!-- Experience Section-->
      <section>
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h2 class="text-primary fw-bolder mb-0">Experience</h2>

        </div>
        @for (entry of experience; track entry.period) {
          <app-resume-card
            [period]="entry.period"
            [headline]="entry.headline"
            [subline]="entry.subline"
            [location]="entry.location"
            [description]="entry.description"
          />
        }
      </section>

    </div>
    <div class="col-xxl-6 col-lg-11 col-xl-9">

      <!-- Education Section-->
      <section>
        <h2 class="text-secondary fw-bolder mb-4">Education</h2>
        @for (entry of education; track entry.period) {
          <app-resume-card
            [period]="entry.period"
            [headline]="entry.headline"
            [subline]="entry.subline"
            [location]="entry.location"
            [description]="entry.description"
            [accentColor]="entry.accentColor ?? 'primary'"
            [badge1]="entry.badge1 ?? ''"
            [badge2]="entry.badge2 ?? ''"
          />
        }
      </section>

      <!-- Skills Section -->
      <section class="mt-5">
        <app-skills-card [groups]="skillGroups" />
      </section>
      <div class="pb-5"></div>

    </div>
  </div>
</div>
